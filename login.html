<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Wavely AI</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            position: relative;
        }
        .auth-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 1.5rem;
            padding: 3.5rem 3rem;
            width: 100%;
            max-width: 450px;
            backdrop-filter: blur(20px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px rgba(99, 102, 241, 0.1);
            position: relative;
            z-index: 10;
        }
        .auth-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 2rem;
            font-family: 'Outfit', sans-serif;
            font-size: 1.8rem;
            font-weight: 800;
            color: white;
            text-decoration: none;
        }
        .auth-logo i {
            color: var(--primary-color);
            font-size: 2.2rem;
        }
        .auth-header { text-align: center; margin-bottom: 2.5rem; }
        .auth-header h1 { font-size: 1.8rem; font-weight: 800; margin-bottom: 0.5rem; }
        .auth-header p { color: var(--text-muted); font-size: 0.95rem; }
        .form-group { margin-bottom: 1.5rem; }
        .form-group label { display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 0.5rem; color: var(--text-main); }
        .form-control {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 1rem 1.25rem;
            border-radius: 0.75rem;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
        }
        .form-control:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
            background: rgba(0,0,0,0.5);
        }
        .btn-block { width: 100%; justify-content: center; padding: 1rem; font-size: 1.05rem; margin-top: 1rem;}
        .auth-footer { text-align: center; margin-top: 2rem; font-size: 0.95rem; color: var(--text-muted); }
        .auth-footer a { color: var(--primary-color); font-weight: 600; transition: color 0.3s; }
        .auth-footer a:hover { color: #a855f7; text-decoration: underline; }
        .social-login {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            margin-bottom: 2rem;
        }
        .btn-social {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-social:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            color: var(--text-muted);
            font-size: 0.85rem;
            margin: 1.5rem 0;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .divider::not(:empty)::before { margin-right: 1rem; }
        .divider::not(:empty)::after { margin-left: 1rem; }
        .forgot-password { text-align: right; margin-top: -0.5rem; margin-bottom: 1.5rem; }
        .forgot-password a { color: var(--text-muted); font-size: 0.85rem; transition: color 0.3s; }
        .forgot-password a:hover { color: var(--primary-color); }
    </style>
</head>
<body>
    <div class="glowing-blob blob-1"></div>
    <div class="glowing-blob blob-2" style="bottom: 0; top: auto;"></div>

    <div class="auth-container fade-in">
        <a href="index.html" style="position: absolute; top: 2rem; left: 2rem; color: var(--text-muted); display: flex; align-items: center; gap: 0.5rem;">
            <i class="ph-bold ph-arrow-left"></i> Back to Home
        </a>

        <div class="auth-card">
            <a href="index.html" class="auth-logo">
                <i class="ph-fill ph-waveform"></i>
                Wavely AI
            </a>
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Log in to access your dashboard</p>
            </div>

            <div class="social-login">
                <button class="btn-social">
                    <i class="ph-fill ph-google-logo" style="font-size: 1.25rem;"></i> Google
                </button>
                <button class="btn-social">
                    <i class="ph-fill ph-microsoft-logo" style="font-size: 1.25rem;"></i> Microsoft
                </button>
            </div>

            <div class="divider">or continue with email</div>

            <form action="#">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="form-control" placeholder="you@company.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="forgot-password">
                    <a href="#">Forgot password?</a>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Sign Up</a>
            </div>
        </div>
    </div>
    <script src="chat-widget.js"></script>
</body>
</html>
