<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watch Demo - Wavely AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@400;500;600;700;800;900&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .page-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            padding: 2rem;
            position: relative;
        }

        .icon-wrapper {
            width: 90px;
            height: 90px;
            background: rgba(139, 92, 246, 0.12);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 2.5rem;
            animation: fadeInDown 0.6s ease forwards;
        }

        .icon-wrapper i {
            font-size: 2.8rem;
            color: #8b5cf6;
        }

        .page-title {
            font-family: 'Outfit', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            color: var(--text-main);
            letter-spacing: -1.5px;
            margin-bottom: 1.2rem;
            animation: fadeInUp 0.6s ease 0.1s both;
        }

        .page-title .dot {
            color: #8b5cf6;
        }

        .page-subtitle {
            font-size: 1.15rem;
            color: var(--text-muted);
            margin-bottom: 3rem;
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        .btn-return {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.9rem 2rem;
            background: white;
            color: #0f172a;
            border-radius: 9999px;
            font-weight: 600;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            animation: fadeInUp 0.6s ease 0.3s both;
        }

        .btn-return:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            background: #f1f5f9;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="glowing-blob blob-1"></div>
    <div class="glowing-blob blob-2"></div>
    <div class="page-container">
        <div class="icon-wrapper">
            <i class="ph-fill ph-play-circle"></i>
        </div>
        <h1 class="page-title">Watch Demo<span class="dot">.</span></h1>
        <p class="page-subtitle">The Demo is going to be live soon.</p>
        <a href="index.html" class="btn-return">
            <i class="ph-bold ph-arrow-left"></i> Return Home
        </a>
    </div>
    <script src="chat-widget.js"></script>
</body>

</html>
